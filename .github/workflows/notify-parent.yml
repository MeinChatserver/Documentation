name: Trigger Parent Update

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Clone and update .ROOT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global http.extraheader "Authorization: token $GITHUB_TOKEN"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          mkdir -p /tmp/root-repo
          cd /tmp/root-repo
          git clone https://github.com/MeinChatserver/.ROOT.git .
          git commit --allow-empty -m "chore: trigger submodule update"
          git push
