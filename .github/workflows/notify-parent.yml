name: Trigger Parent Update

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Clone and update .ROOT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/root-repo
          cd /tmp/root-repo
          git clone https://${GITHUB_TOKEN}@github.com/MeinChatserver/.ROOT.git .
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git commit --allow-empty -m "chore: trigger submodule update"
          git push
